<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>우리 학교 탐험대</title>
<style>
:root {
  --green-dark: #1B4332;
  --green: #2D6A4F;
  --green-mid: #40916C;
  --green-light: #52B788;
  --green-pale: #D8F3DC;
  --amber: #F59E0B;
  --bg: #F4F7F5;
  --white: #FFFFFF;
  --text: #1B2E22;
  --muted: #6B8872;
  --border: #CBD5CC;
  --red: #DC2626;
  --red-pale: #FEE2E2;
  --r: 18px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; background: var(--bg); color: var(--text); }

/* ─── 공통 버튼 ─── */
.btn-primary { width: 100%; background: var(--green); color: #fff; border: none; border-radius: var(--r); padding: 15px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 10px; transition: background .15s, transform .1s; }
.btn-primary:active { transform: scale(.97); background: var(--green-dark); }
.btn-ghost { width: 100%; background: var(--white); color: var(--muted); border: 1.5px solid var(--border); border-radius: var(--r); padding: 13px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background .15s; }
.btn-ghost:active { background: var(--green-pale); }

/* ─── SCREEN 1: 스캔 ─── */
#screen-scan {
  min-height: 100vh;
  background: linear-gradient(160deg, var(--green-dark) 0%, var(--green) 55%, var(--green-mid) 100%);
  display: flex; flex-direction: column; align-items: center;
  justify-content: space-between; padding: 3rem 1.5rem 2.5rem;
}
.scan-title { text-align: center; }
.scan-title .eyebrow { font-size: 12px; letter-spacing: .15em; color: rgba(255,255,255,.55); margin-bottom: 8px; }
.scan-title h1 { font-size: 28px; font-weight: 700; color: #fff; line-height: 1.3; }
.scan-title p { font-size: 14px; color: rgba(255,255,255,.65); margin-top: 6px; }

.cam-box {
  width: 270px; height: 270px; position: relative;
  border-radius: 22px; overflow: hidden;
  border: 2.5px solid rgba(255,255,255,.25);
  background: rgba(0,0,0,.45); flex-shrink: 0;
}
#cam-video { width: 100%; height: 100%; object-fit: cover; display: block; }
.cam-corner { position: absolute; width: 26px; height: 26px; z-index: 3; }
.cam-corner.tl { top:8px; left:8px;  border-top: 3px solid var(--amber); border-left: 3px solid var(--amber); border-radius:6px 0 0 0; }
.cam-corner.tr { top:8px; right:8px; border-top: 3px solid var(--amber); border-right:3px solid var(--amber); border-radius:0 6px 0 0; }
.cam-corner.bl { bottom:8px; left:8px;  border-bottom:3px solid var(--amber); border-left: 3px solid var(--amber); border-radius:0 0 0 6px; }
.cam-corner.br { bottom:8px; right:8px; border-bottom:3px solid var(--amber); border-right:3px solid var(--amber); border-radius:0 0 6px 0; }
.scan-line { position:absolute; left:12px; right:12px; height:2px; background: linear-gradient(90deg,transparent,var(--amber),transparent); animation: scanmove 2s ease-in-out infinite; top:50%; z-index:2; display:none; }
@keyframes scanmove { 0%,100%{transform:translateY(-95px);opacity:.5} 50%{transform:translateY(95px);opacity:1} }

.cam-overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:16px; z-index:4; }
.cam-overlay .icon { font-size:38px; }
.cam-overlay p { font-size:13px; color:rgba(255,255,255,.85); text-align:center; line-height:1.5; }
.cam-start-btn { background:rgba(255,255,255,.18); border:1.5px solid rgba(255,255,255,.5); color:#fff; font-size:14px; font-weight:700; padding:9px 22px; border-radius:50px; cursor:pointer; font-family:inherit; }
.cam-start-btn:active { background:rgba(255,255,255,.3); }

.scan-bottom { width: 100%; display: flex; flex-direction: column; gap: 10px; }
.admin-link { text-align:center; }
.admin-link button { background:none; border:none; color:rgba(255,255,255,.5); font-size:13px; cursor:pointer; font-family:inherit; text-decoration:underline; padding:4px; }

/* ─── SCREEN 2: 공간 탭 ─── */
#screen-space { min-height:100vh; display:flex; flex-direction:column; background:var(--bg); }

.space-hero { position:relative; height:46vw; max-height:240px; flex-shrink:0; overflow:hidden; background:var(--green-pale); }
.space-hero img { width:100%; height:100%; object-fit:cover; }
.space-hero .emoji-fallback { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:70px; }
.space-hero-overlay { position:absolute; inset:0; background:linear-gradient(transparent 35%,rgba(0,0,0,.5)); display:flex; align-items:flex-end; padding:1rem 1.2rem; }
.space-badge { background:var(--amber); color:#fff; font-size:12px; font-weight:700; padding:3px 12px; border-radius:50px; margin-bottom:6px; display:inline-block; }
.space-name { font-size:26px; font-weight:700; color:#fff; }

/* 탭 */
.tab-bar { display:flex; overflow-x:auto; background:var(--white); border-bottom:1px solid var(--border); flex-shrink:0; scrollbar-width:none; }
.tab-bar::-webkit-scrollbar { display:none; }
.tab-item { flex-shrink:0; padding:12px 16px; font-size:14px; font-weight:600; color:var(--muted); cursor:pointer; border-bottom:2.5px solid transparent; white-space:nowrap; transition:color .15s; }
.tab-item.active { color:var(--green); border-bottom-color:var(--green); }

/* 탭 콘텐츠 */
.tab-content { flex:1; overflow-y:auto; padding:1.2rem; display:flex; flex-direction:column; gap:12px; }

.rule-card { background:var(--white); border:1.5px solid var(--border); border-radius:14px; padding:.9rem 1.1rem; display:flex; align-items:flex-start; gap:12px; }
.rule-num { width:30px; height:30px; border-radius:50%; background:var(--green); color:#fff; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; flex-shrink:0; }
.rule-text { font-size:15px; line-height:1.65; color:var(--text); padding-top:3px; }

.tts-row { display:flex; gap:10px; flex-shrink:0; padding:0 1.2rem; }
.tts-btn { flex:1; padding:13px; border-radius:var(--r); border:none; cursor:pointer; font-size:15px; font-weight:700; font-family:inherit; display:flex; align-items:center; justify-content:center; gap:6px; }
.tts-btn.play { background:var(--amber); color:#fff; }
.tts-btn.stop { background:var(--green-pale); color:var(--green); }

.nav-row { padding:1rem 1.2rem 2rem; display:flex; gap:10px; }
.nav-row .btn-ghost { flex:1; }

/* ─── SCREEN 3: 관리자 ─── */
#screen-admin { min-height:100vh; display:flex; flex-direction:column; background:var(--bg); }
.admin-header { background:var(--green-dark); padding:1.5rem 1.2rem 1.2rem; flex-shrink:0; }
.admin-header h2 { font-size:20px; font-weight:700; color:#fff; }
.admin-header p { font-size:13px; color:rgba(255,255,255,.5); margin-top:3px; }

.admin-scroll { flex:1; overflow-y:auto; padding:1.2rem; display:flex; flex-direction:column; gap:14px; }

.admin-card { background:var(--white); border:1.5px solid var(--border); border-radius:16px; overflow:hidden; }
.admin-card-header { display:flex; align-items:center; gap:10px; padding:14px 16px; cursor:pointer; }
.admin-card-header .ac-emoji { font-size:22px; }
.admin-card-header .ac-name { font-size:15px; font-weight:700; color:var(--text); flex:1; }
.admin-card-header .ac-chev { color:var(--muted); font-size:16px; transition:transform .2s; }
.admin-card-header.open .ac-chev { transform:rotate(180deg); }
.admin-card-body { display:none; border-top:1px solid var(--border); padding:14px 16px 16px; }
.admin-card-body.open { display:flex; flex-direction:column; gap:14px; }

.field-label { font-size:12px; font-weight:700; color:var(--muted); margin-bottom:6px; display:block; }
.field-input, .field-textarea {
  width:100%; background:var(--bg); border:1.5px solid var(--border); border-radius:12px;
  padding:10px 14px; font-size:14px; font-family:inherit; color:var(--text); outline:none;
  transition:border-color .2s;
}
.field-input:focus, .field-textarea:focus { border-color:var(--green-light); }
.field-textarea { resize:vertical; min-height:90px; line-height:1.65; }

.img-upload-row { display:flex; gap:10px; align-items:center; }
.img-thumb { width:80px; height:64px; border-radius:10px; background:var(--bg); border:1.5px dashed var(--border); display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--muted); text-align:center; overflow:hidden; flex-shrink:0; }
.img-thumb img { width:100%; height:100%; object-fit:cover; border-radius:9px; }
.upload-btn { flex:1; background:var(--green-pale); color:var(--green); border:1.5px solid var(--green-light); border-radius:12px; padding:11px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; text-align:center; }
.upload-btn:active { background:#B7E4C7; }

.admin-save-btn { width:100%; background:var(--green); color:#fff; border:none; border-radius:var(--r); padding:15px; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit; transition:background .15s; }
.admin-save-btn:active { background:var(--green-dark); }

.admin-close { margin-top:4px; }

/* ─── 토스트 ─── */
.toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%); background:var(--green-dark); color:#fff; padding:10px 22px; border-radius:50px; font-size:14px; opacity:0; pointer-events:none; transition:opacity .3s; z-index:999; white-space:nowrap; }
.toast.show { opacity:1; }

input[type=file] { display:none; }
</style>
</head>
<body>

<!-- ══════════════════════════════
     SCREEN 1: QR 스캔
══════════════════════════════ -->
<div id="screen-scan">
  <div class="scan-title">
    <div class="eyebrow">우리 학교 탐험대</div>
    <h1>QR코드를<br>찍어보세요!</h1>
    <p>공간의 QR코드를 카메라로 인식해요</p>
  </div>

  <div class="cam-box">
    <video id="cam-video" autoplay playsinline muted></video>
    <canvas id="cam-canvas" style="display:none;"></canvas>
    <div class="cam-corner tl"></div>
    <div class="cam-corner tr"></div>
    <div class="cam-corner bl"></div>
    <div class="cam-corner br"></div>
    <div class="scan-line" id="scan-line"></div>
    <div class="cam-overlay" id="cam-overlay">
      <div class="icon">📷</div>
      <p>카메라를 시작하면<br>QR코드를 자동으로 읽어요</p>
      <button class="cam-start-btn" onclick="startCamera()">카메라 시작</button>
    </div>
  </div>

  <div class="scan-bottom">
    <div class="admin-link">
      <button onclick="showAdmin()">⚙️ 선생님 관리자 모드</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════
     SCREEN 2: 공간 정보
══════════════════════════════ -->
<div id="screen-space" style="display:none;">

  <!-- 히어로 이미지 -->
  <div class="space-hero">
    <div class="emoji-fallback" id="hero-fallback"></div>
    <img id="hero-img" src="" alt="" style="display:none;position:absolute;inset:0;">
    <div class="space-hero-overlay">
      <div>
        <div class="space-badge" id="hero-badge"></div>
        <div class="space-name" id="hero-name"></div>
      </div>
    </div>
  </div>

  <!-- 탭 바 -->
  <div class="tab-bar" id="tab-bar"></div>

  <!-- 탭 콘텐츠 -->
  <div class="tab-content" id="tab-content"></div>

  <!-- TTS + 네비 -->
  <div class="tts-row">
    <button class="tts-btn play" onclick="startTTS()">🔊 읽어주기</button>
    <button class="tts-btn stop" onclick="stopTTS()">⏹ 멈추기</button>
  </div>
  <div class="nav-row">
    <button class="btn-ghost" onclick="backToScan()">← 처음으로</button>
  </div>
</div>

<!-- ══════════════════════════════
     SCREEN 3: 관리자
══════════════════════════════ -->
<div id="screen-admin" style="display:none;">
  <div class="admin-header">
    <h2>⚙️ 관리자 모드</h2>
    <p>공간 사진과 이용 규칙을 수정하세요</p>
  </div>
  <div class="admin-scroll">
    <div id="admin-cards"></div>
    <button class="admin-save-btn" onclick="saveAll()">💾 모두 저장</button>
    <div class="admin-close">
      <button class="btn-ghost" onclick="backToScan()">← 학생 화면으로</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="file-img" accept="image/*">

<script>
/* ═══════════════════════════════════════
   공간 데이터
═══════════════════════════════════════ */
const SPACES = [
  {
    id: 'hallway',
    name: '복도',
    emoji: '🚶',
    badge: '이동 공간',
    url: '?space=hallway',
    photo: 'https://raw.githubusercontent.com/momokhj/school_rule/main/hallway.jpg',
    rules: [
      '오른쪽으로 걸어요',
      '천천히 걸어요'
    ]
  },
  {
    id: 'ramp',
    name: '경사로',
    emoji: '♿',
    badge: '무장애 이동',
    url: '?space=ramp',
    photo: 'https://raw.githubusercontent.com/momokhj/school_rule/main/ramp.jpg',
    rules: [
      '휠체어를 타는 친구가 먼저 이용해요',
      '천천히 걸어요'
    ]
  },
  {
    id: 'elevator',
    name: '엘리베이터',
    emoji: '🛗',
    badge: '우선 이용 시설',
    url: '?space=elevator',
    photo: 'https://raw.githubusercontent.com/momokhj/school_rule/main/elevator.jpg',
    rules: [
      '엘리베이터 안에서 뛰거나 장난치지 않아요',
      '버튼을 여러 번 누르지 않아요',
      '위급상황이 생기면 비상벨을 눌러요'
    ]
  },
  {
    id: 'stairs',
    name: '계단',
    emoji: '🪜',
    badge: '이동 공간',
    url: '?space=stairs',
    photo: 'https://raw.githubusercontent.com/momokhj/school_rule/main/stairs.jpg',
    rules: [
      '한 칸씩 올라가요',
      '한 칸씩 내려가요',
      '난간을 잡고 천천히 이동해요',
      '계단에서 뛰거나 점프하지 않아요'
    ]
  },
  {
    id: 'library',
    name: '도서관',
    emoji: '📚',
    badge: '독서 공간',
    url: '?space=library',
    photo: 'https://raw.githubusercontent.com/momokhj/school_rule/main/library.jpg',
    rules: [
      '도서관 안에서는 조용히 해요',
      '읽은 책은 제자리에 꽂아요',
      '책을 빌릴 때 선생님께 말씀드려요'
    ]
  },
  {
    id: 'cafeteria',
    name: '급식실',
    emoji: '🍽',
    badge: '식사 공간',
    url: '?space=cafeteria',
    photo: 'https://raw.githubusercontent.com/momokhj/school_rule/main/cafeteria.jpg',
    rules: [
      '줄을 서서 차례대로 기다려요',
      '음식을 골고루 먹어요',
      '식판은 정해진 곳에 반납해요'
    ]
  }
];

/* ═══════════════════════════════════════
   저장/불러오기
═══════════════════════════════════════ */
function saveData() {
  const payload = SPACES.map(s => ({ id: s.id, photo: s.photo, rules: s.rules }));
  localStorage.setItem('schoolSpacesV2', JSON.stringify(payload));
}



/* ═══════════════════════════════════════
   화면 전환
═══════════════════════════════════════ */
let currentSpaceId = null;

function showScan() {
  document.getElementById('screen-scan').style.display = 'flex';
  document.getElementById('screen-space').style.display = 'none';
  document.getElementById('screen-admin').style.display = 'none';
}
function showSpace(id) {
  stopCamera();
  currentSpaceId = id;
  renderSpaceScreen(id);
  document.getElementById('screen-scan').style.display = 'none';
  document.getElementById('screen-space').style.display = 'flex';
  document.getElementById('screen-admin').style.display = 'none';
}
function showAdmin() {
  stopCamera();
  renderAdmin();
  document.getElementById('screen-scan').style.display = 'none';
  document.getElementById('screen-space').style.display = 'none';
  document.getElementById('screen-admin').style.display = 'flex';
}
function backToScan() {
  stopTTS();
  showScan();
}

/* ═══════════════════════════════════════
   공간 화면 렌더
═══════════════════════════════════════ */
function renderSpaceScreen(id) {
  const space = SPACES.find(s => s.id === id);
  if (!space) return;

  // 히어로
  document.getElementById('hero-badge').textContent = space.badge;
  document.getElementById('hero-name').textContent = space.name;
  const fb = document.getElementById('hero-fallback');
  const img = document.getElementById('hero-img');
  fb.textContent = space.emoji;
  if (space.photo) {
    img.src = space.photo; img.style.display = 'block'; fb.style.display = 'none';
  } else {
    img.style.display = 'none'; fb.style.display = 'flex';
  }

  // 탭 바 — 모든 공간 탭
  const tabBar = document.getElementById('tab-bar');
  tabBar.innerHTML = SPACES.map(s =>
    `<div class="tab-item ${s.id === id ? 'active' : ''}" onclick="switchTab('${s.id}')">${s.emoji} ${s.name}</div>`
  ).join('');

  // 규칙 콘텐츠
  renderRules(space);
}

function switchTab(id) {
  currentSpaceId = id;
  const space = SPACES.find(s => s.id === id);
  stopTTS();

  // 히어로 업데이트
  document.getElementById('hero-badge').textContent = space.badge;
  document.getElementById('hero-name').textContent = space.name;
  const fb = document.getElementById('hero-fallback');
  const img = document.getElementById('hero-img');
  fb.textContent = space.emoji;
  if (space.photo) {
    img.src = space.photo; img.style.display = 'block'; fb.style.display = 'none';
  } else {
    img.style.display = 'none'; fb.style.display = 'flex';
  }

  // 탭 활성화
  document.querySelectorAll('.tab-item').forEach((el, i) => {
    el.classList.toggle('active', SPACES[i].id === id);
  });

  renderRules(space);
}

function renderRules(space) {
  document.getElementById('tab-content').innerHTML = (space.rules || []).map((r, i) => `
    <div class="rule-card">
      <div class="rule-num">${i + 1}</div>
      <div class="rule-text">${r}</div>
    </div>
  `).join('');
}

/* ═══════════════════════════════════════
   TTS
═══════════════════════════════════════ */
function startTTS() {
  const space = SPACES.find(s => s.id === currentSpaceId);
  if (!space) return;
  stopTTS();
  const text = `${space.name} 이용 규칙입니다. ` +
    space.rules.map((r, i) => `${i + 1}번. ${r}`).join('. ');
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ko-KR'; u.rate = 0.88; u.pitch = 1.05;
  speechSynthesis.speak(u);
}
function stopTTS() { speechSynthesis.cancel(); }

/* ═══════════════════════════════════════
   카메라 & QR 스캔
═══════════════════════════════════════ */
let camStream = null;
let scanTimer = null;

async function startCamera() {
  const overlay = document.getElementById('cam-overlay');
  overlay.innerHTML = '<div class="icon" style="animation:spin 1s linear infinite">⏳</div><p>카메라 연결 중...</p>';

  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 640 }, height: { ideal: 640 } }
    });
    const video = document.getElementById('cam-video');
    video.srcObject = camStream;
    video.onloadedmetadata = () => {
      video.play();
      overlay.style.display = 'none';
      document.getElementById('scan-line').style.display = 'block';
      beginScan();
    };
  } catch(e) {
    overlay.innerHTML = `<div class="icon">🚫</div><p>카메라를 사용할 수 없어요</p><button class="cam-start-btn" onclick="startCamera()">다시 시도</button>`;
  }
}

function stopCamera() {
  clearInterval(scanTimer); scanTimer = null;
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  const video = document.getElementById('cam-video');
  video.srcObject = null;
  document.getElementById('scan-line').style.display = 'none';
  const overlay = document.getElementById('cam-overlay');
  overlay.style.display = 'flex';
  overlay.innerHTML = `<div class="icon">📷</div><p>카메라를 시작하면<br>QR코드를 자동으로 읽어요</p><button class="cam-start-btn" onclick="startCamera()">카메라 시작</button>`;
}

function beginScan() {
  // BarcodeDetector 우선
  if (typeof BarcodeDetector !== 'undefined') {
    const det = new BarcodeDetector({ formats: ['qr_code'] });
    const video = document.getElementById('cam-video');
    scanTimer = setInterval(async () => {
      if (video.readyState < 2) return;
      try {
        const codes = await det.detect(video);
        if (codes.length) handleQR(codes[0].rawValue);
      } catch(e) {}
    }, 350);
  } else {
    loadJsQR(beginJsQRScan);
  }
}

function beginJsQRScan() {
  const video = document.getElementById('cam-video');
  const canvas = document.getElementById('cam-canvas');
  const ctx = canvas.getContext('2d');
  scanTimer = setInterval(() => {
    if (video.readyState < 2) return;
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    const d = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(d.data, d.width, d.height, { inversionAttempts: 'dontInvert' });
    if (code) handleQR(code.data);
  }, 280);
}

function loadJsQR(cb) {
  if (typeof jsQR !== 'undefined') { cb(); return; }
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js';
  s.onload = cb;
  s.onerror = () => showToast('QR 스캔을 지원하지 않는 환경이에요');
  document.head.appendChild(s);
}

function handleQR(raw) {
  clearInterval(scanTimer); scanTimer = null;

  // URL 파라미터 방식: ?space=hallway 또는 전체 URL 포함
  let spaceId = raw;
  try {
    const url = new URL(raw);
    spaceId = url.searchParams.get('space') || raw;
  } catch(e) {
    // URL이 아니면 raw 값 그대로 사용
  }
  // ?space=hallway 형태 (URL 아닌 경우)
  if (spaceId.startsWith('?space=')) spaceId = spaceId.replace('?space=', '');

  const found = SPACES.find(s => s.id === spaceId);
  if (found) {
    showSpace(found.id);
  } else {
    showToast('등록된 공간의 QR코드가 아니에요');
    setTimeout(beginScan, 1800);
  }
}

/* ═══════════════════════════════════════
   URL 파라미터로 직접 진입
═══════════════════════════════════════ */
function checkURLParam() {
  const params = new URLSearchParams(location.search);
  const spaceParam = params.get('space');
  if (spaceParam) {
    const found = SPACES.find(s => s.id === spaceParam);
    if (found) showSpace(found.id);
  }
}

/* ═══════════════════════════════════════
   관리자 화면
═══════════════════════════════════════ */
let editingImgId = null;

function renderAdmin() {
  document.getElementById('admin-cards').innerHTML = SPACES.map(s => `
    <div class="admin-card">
      <div class="admin-card-header" onclick="toggleAC('${s.id}')">
        <span class="ac-emoji">${s.emoji}</span>
        <span class="ac-name">${s.name}</span>
        <span class="ac-chev">▾</span>
      </div>
      <div class="admin-card-body" id="acb_${s.id}">

        <div>
          <label class="field-label">📷 공간 사진</label>
          <div class="img-upload-row">
            <div class="img-thumb" id="thumb_${s.id}">
              ${s.photo ? `<img src="${s.photo}">` : '사진 없음'}
            </div>
            <button class="upload-btn" onclick="openImgPicker('${s.id}')">📁 사진 선택</button>
          </div>
          <input class="field-input" id="photo_url_${s.id}" placeholder="또는 URL 직접 입력"
            value="${s.photo || ''}" oninput="previewPhoto('${s.id}')" style="margin-top:8px;">
        </div>

        <div>
          <label class="field-label">📋 이용 규칙 (한 줄에 하나씩)</label>
          <textarea class="field-textarea" id="rules_${s.id}" rows="6">${(s.rules || []).join('\n')}</textarea>
        </div>

      </div>
    </div>
  `).join('');
}

function toggleAC(id) {
  const body = document.getElementById('acb_' + id);
  const header = body.previousElementSibling;
  body.classList.toggle('open');
  header.classList.toggle('open');
}

function previewPhoto(id) {
  const val = document.getElementById('photo_url_' + id).value.trim();
  const thumb = document.getElementById('thumb_' + id);
  thumb.innerHTML = val ? `<img src="${val}" onerror="this.parentElement.textContent='오류'">` : '사진 없음';
}

function openImgPicker(id) {
  editingImgId = id;
  const inp = document.getElementById('file-img');
  inp.value = ''; inp.click();
}

document.getElementById('file-img').addEventListener('change', function () {
  if (!this.files[0] || !editingImgId) return;
  const id = editingImgId;
  const reader = new FileReader();
  reader.onload = e => {
    const b64 = e.target.result;
    document.getElementById('photo_url_' + id).value = b64;
    document.getElementById('thumb_' + id).innerHTML = `<img src="${b64}">`;
  };
  reader.readAsDataURL(this.files[0]);
});

function saveAll() {
  SPACES.forEach(s => {
    const urlEl = document.getElementById('photo_url_' + s.id);
    const rulesEl = document.getElementById('rules_' + s.id);
    if (urlEl) s.photo = urlEl.value.trim();
    if (rulesEl) s.rules = rulesEl.value.split('\n').map(r => r.trim()).filter(Boolean);
  });
  saveData();
  showToast('✅ 저장 완료!');
}

/* ═══════════════════════════════════════
   토스트
═══════════════════════════════════════ */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

/* ═══════════════════════════════════════
   초기화
═══════════════════════════════════════ */
checkURLParam();
</script>
